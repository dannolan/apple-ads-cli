name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go build -o ads ./cmd/ads
      - run: ./ads --help
      - run: go build -ldflags "-X github.com/dannolan/apple-ads-cli/internal/cli.Version=ci" -o ads ./cmd/ads
      - run: ./ads version --json | grep ci
      - run: test -f cmd/ads/main.go
